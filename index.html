<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>elTheodoro Edit</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
      font-family: Arial, sans-serif;
    }

    #startscreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: black;
      color: white;
      z-index: 10;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 40px;
    }

    button {
      padding: 20px 50px;
      font-size: 30px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: red;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.1);
    }

    #jumpscare {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: black;
      z-index: 9999;
    }

    #jumpscare img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      animation: shake 0.04s infinite;
    }

    @keyframes shake {
      0% { transform: translate(10px, 10px); }
      25% { transform: translate(-10px, 5px); }
      50% { transform: translate(10px, -10px); }
      75% { transform: translate(-5px, -10px); }
      100% { transform: translate(10px, 10px); }
    }
  </style>
</head>
<body>

<div id="startscreen">
  <h1>elTheodoro Edit starten</h1>
  <button onclick="startScare()">START</button>
</div>

<div id="jumpscare">
  <img src="https://i.imgur.com/4M7IWwP.jpeg">
</div>

<video id="sound" preload="auto">
  <source src="https://cdn.discordapp.com/attachments/1493350577449734195/1509636550139445349/Scary_Screamer_-_Sound_Effect_Free.mp4?ex=6a19e619&is=6a189499&hm=ac0e06f0e0ca3bdb89bd66aec3f56f43a0b56b35defae5ea9e952c97e5e1b8dc&" type="video/mp4">
</video>

<script>
function startScare() {

  document.getElementById("startscreen").style.display = "none";

  const scare = document.getElementById("jumpscare");
  const sound = document.getElementById("sound");

  scare.style.display = "flex";

  sound.volume = 1.0;
  sound.play();

  document.documentElement.requestFullscreen?.();
}
</script>

</body>
</html>
