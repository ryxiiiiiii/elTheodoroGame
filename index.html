<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      width: 100%;
      height: 100%;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 42px;
      font-family: Arial, sans-serif;
      background: black;
    }

    #jumpscare {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      background: black;
    }

    #jumpscare img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      animation: shake 0.04s infinite;
    }

    @keyframes shake {
      0% { transform: translate(10px, 10px); }
      25% { transform: translate(-10px, 5px); }
      50% { transform: translate(10px, -10px); }
      75% { transform: translate(-5px, -10px); }
      100% { transform: translate(10px, 10px); }
    }
  </style>
</head>
<body>

<div id="loading">
  Website lädt...
</div>

<div id="jumpscare">
  <img src="https://i.imgur.com/4M7IWwP.jpeg">
</div>

<video id="sound" preload="auto">
  <source src="https://cdn.discordapp.com/attachments/1493350577449734195/1509636550139445349/Scary_Screamer_-_Sound_Effect_Free.mp4?ex=6a19e619&is=6a189499&hm=ac0e06f0e0ca3bdb89bd66aec3f56f43a0b56b35defae5ea9e952c97e5e1b8dc&" type="video/mp4">
</video>

<script>
window.onload = () => {

  setTimeout(() => {

    document.getElementById("loading").style.display = "none";

    const scare = document.getElementById("jumpscare");
    const sound = document.getElementById("sound");

    scare.style.display = "flex";

    sound.volume = 1.0;

    sound.play().catch(() => {
      console.log("Autoplay blockiert");
    });

    document.documentElement.requestFullscreen?.();

  }, 1000); // 1 Sekunde

};
</script>

</body>
</html>
